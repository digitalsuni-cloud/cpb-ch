<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CPB XML/JSON Generator</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Custom Price Book XML/JSON Generator</h1>

  <label for="bookName">Price Book Name (required):</label>
  <input type="text" id="bookName" required />

  <label for="createdBy">Created By (required):</label>
  <input type="text" id="createdBy" required />

  <label for="comment">Comment:</label>
  <input type="text" id="comment" />

  <div id="ruleGroups"></div>
  <button onclick="addRuleGroup()">Add Rule Group</button>

  <br /><br />
  <button onclick="generateXML()">Generate XML</button>
  <button onclick="generateJSON()">Generate JSON for REST API Payload Body</button>

  <h2>Generated XML:</h2>
  <textarea id="output" rows="10" cols="80"></textarea>

  <h2>Custom Pricebook JSON Payload:</h2>
  <textarea id="jsonOutput" rows="10" cols="80"></textarea>

  <footer class="footer-note">Created by Sunil Kumar – CloudHealth</footer>

  <script src="script.js"></script>
</body>
</html>

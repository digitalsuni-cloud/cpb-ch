<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CPB XML/JSON Generator</title>
  <style>
    body { font-family: Arial; margin: 20px; }

    input, select, button, textarea { margin: 5px 0; }
    .ruleGroup, .rule, .sub-entry {
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
    }

    .section-title { margin-top: 20px; font-weight: bold; }
    .sub-group { margin-top: 10px; }
    .sub-entry {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 5px;
    }
    .sub-entry input[type="text"] {
      flex-grow: 1;
      max-width: 80%;
    }
    .sub-entry select.lineItemType {
      width: 125px;
      flex-shrink: 0;
      padding: 5px;
    }
    .sub-entry button {
      padding: 0 8px;
    }

    /* ✅ Updated select style with padding and round corners */
    select {
      padding: 5px;
      background-color: #eee;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .small-label {
      font-size: 0.8em;
      margin-top: 5px;
    }

    .small-select select {
      font-size: 0.8em;
      padding: 2px 4px;
    }

    input.ruleName,
    input.productName,
    .sub-entry input.usageTypeName,
    .sub-entry input.lineItemValue {
      display: block;
      width: 75%;
      padding: 5px;
      margin-bottom: 10px;
      border-radius: 6px;
      box-sizing: border-box;
    }

    input.billingAdjustment,
    input.startDate,
    input.endDate,
    input.region {
      padding: 5px;
      border-radius: 6px;
      box-sizing: border-box;
    }

    #bookName,
    #createdBy,
    #comment {
      width: 15%;
      padding: 5px;
      border-radius: 6px;
      margin-right: 15px;
      margin-bottom: 15px;
      box-sizing: border-box;
    }

    #bookName + label,
    #createdBy + label,
    #comment + label {
      margin-top: 15px;
    }

    .ruleGroup label,
    .ruleGroup input {
      margin-bottom: 10px;
    }

    .ruleGroup .startDate,
    .ruleGroup .endDate {
      margin-right: 30px;
    }

    .rule .billingAdjustment {
      margin-right: 30px;
      margin-bottom: 15px;
    }

    .rule .billingRuleType {
      margin-top: 10px;
    }

    select.includeRIPurchases,
    select.productIncludeRIPurchases {
      margin-bottom: 20px;
    }

    body {
      background-color: #fff;
      color: #000;
    }

    /* ✅ Updated button styling */
    button.export-json {
  background-color: #3f88c5; /* soft blue */
  color: white;
}

button.export-json:hover {
  background-color: #357bb3;
}
button.remove-usagetype,
button.remove-lineitem,
button.remove-rule,
button.remove-rule-group {
  background-color: #d9534f; /* soft bootstrap-style red */
  color: white;
  border: none;
  border-radius: 12px;
  padding: 6px 12px;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  transition: background-color 0.3s, transform 0.2s;
}
button.remove-usagetype:hover,
button.remove-lineitem:hover,
button.remove-rule:hover,
button.remove-rule-group:hover {
  background-color: #c9302c; /* darker red for hover */
  transform: scale(1.05);
}
button.remove-usagetype:focus,
button.remove-lineitem:focus,
button.remove-rule:focus,
button.remove-rule-group:focus {
  outline: none;
  box-shadow: 0 0 5px rgba(217, 83, 79, 0.5);
}
    button {
      padding: 6px 12px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      transition: background-color 0.3s, transform 0.2s;
    }

    button:hover {
      background-color: #45a049;
      transform: scale(1.05);
    }

    button:focus {
      outline: none;
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
    }

    /* ✅ Dark mode styles including select updates */
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #1e1e1e;
        color: #f0f0f0;
      }

      input, select, textarea, button {
        background-color: #333;
        color: #f0f0f0;
        border: 1px solid #555;
      }

      .ruleGroup, .rule, .sub-entry {
        border-color: #444;
      }

      button {
        background-color: #444;
        color: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
      }

      button:hover {
        background-color: #555;
        transform: scale(1.05);
      }

      button:focus {
        outline: none;
        box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
      }

      select {
        background-color: #333;
        border-radius: 6px;
      }
    }

    footer {
      text-align: right;
      margin-top: 20px;
      padding: 5px 0;
      font-size: 0.80em;
      color: #616060f2;
    }
</style>

  <textarea id="outputXML" rows="10" style="width:75%;"></textarea>

    function addUsageType(button) {
      const container = button.closest('.sub-group').querySelector('.usageTypes');
      const div = document.createElement('div');
      div.className = 'sub-entry';
      div.innerHTML = `
        <button type="button" class="remove-usagetype" onclick="this.parentElement.remove()">×</button>
        <input type="text" class="usageTypeName" placeholder="UsageType name..." />
      `;
      container.appendChild(div);
    }

    function addLineItemDescription(button) {
      const container = button.closest('.sub-group').querySelector('.lineItemDescriptions');
      const div = document.createElement('div');
      div.className = 'sub-entry';
      div.innerHTML = `
        <button type="button" class="remove-lineitem" onclick="this.parentElement.remove()">×</button>
        <select class="lineItemType">
          <option value="contains">contains</option>
          <option value="startsWith">startsWith</option>
          <option value="matchesRegex">matchesRegex</option>
        </select>
        <input type="text" class="lineItemValue" placeholder="Enter LineItem Description..." />
      `;
      container.appendChild(div);
    }

    function generateXML() {
      const createdBy = document.getElementById('createdBy').value;
      const comment = document.getElementById('comment').value || '';
      if (!createdBy) {
        alert("Created By is required.");
        return;
      }

      const groups = document.querySelectorAll('.ruleGroup');
      let xml = `<?xml version="1.0" encoding="UTF-8"?>\n<CHTBillingRules createdBy="${createdBy}" date="${new Date().toISOString().split('T')[0]}">\n\t<Comment>${comment}</Comment>\n`;

      groups.forEach(group => {
        const startDate = group.querySelector('.startDate').value;
        const endDate = group.querySelector('.endDate').value;
        const enabled = group.querySelector('.enabled').value;

        xml += `\t<RuleGroup startDate="${startDate}"${endDate ? ` endDate="${endDate}"` : ''}${enabled === "false" ? ` enabled="false"` : ''}>\n`;

        const rules = group.querySelectorAll('.rule');
        rules.forEach(rule => {
          const name = rule.querySelector('.ruleName').value;
          const adj = rule.querySelector('.billingAdjustment').value || '0.00';
          const type = rule.querySelector('.billingRuleType').value;
          const dataTransfer = rule.querySelector('.includeDataTransfer').value;
          const rip = rule.querySelector('.includeRIPurchases').value;
          const product = rule.querySelector('.productName').value || 'ANY';

          const prodDT = rule.querySelector('.productIncludeDataTransfer').value;
          const prodRIP = rule.querySelector('.productIncludeRIPurchases').value;
          const region = rule.querySelector('.region').value;

          xml += `\t\t<BillingRule name="${name}" includeDataTransfer="${dataTransfer}"${rip === "true" ? ` includeRIPurchases="true"` : ''}>\n`;
          xml += `\t\t\t<BasicBillingRule billingAdjustment="${adj}" billingRuleType="${type}"/>\n`;
          xml += `\t\t\t<Product productName="${product}"${prodDT ? ` includeDataTransfer="${prodDT}"` : ''}${prodRIP ? ` includeRIPurchases="${prodRIP}"` : ''}>`;

          let subTags = '';

          if (region) subTags += `\n\t\t\t\t<Region name="${region}"/>`;

          const usageTypes = rule.querySelectorAll('.usageTypes .usageTypeName');
          usageTypes.forEach(typeEl => {
            const usageName = typeEl.value.trim();
            if (usageName) subTags += `\n\t\t\t\t<UsageType name="${usageName}"/>`;
          });

          const lineItems = rule.querySelectorAll('.lineItemDescriptions .sub-entry');
          lineItems.forEach(item => {
            const key = item.querySelector('.lineItemType').value;
            const val = item.querySelector('.lineItemValue').value;
            if (val) subTags += `\n\t\t\t\t<LineItemDescription ${key}="${val}" />`;
          });

          if (subTags) {
            xml += `${subTags}\n\t\t\t</Product>\n`;
          } else {
            xml += `</Product>\n`;
          }

          xml += `\t\t</BillingRule>\n`;
        });

        xml += `\t</RuleGroup>\n`;
      });

      xml += `</CHTBillingRules>`;
      document.getElementById('outputXML').value = xml;
    }

    function exportJSON() {
      const bookName = document.getElementById('bookName').value.trim();
      const xml = document.getElementById('outputXML').value;

      if (!bookName) {
        alert("Book Name is required.");
        return;
      }

      if (!xml) {
        alert("Generate XML before exporting JSON.");
        return;
      }

      const escapedXML = xml.replace(/"/g, '\\"');
      const json = `{"book_name":"${bookName}","specification":"${escapedXML}"}`;
      document.getElementById('outputJSON').value = json;
    }

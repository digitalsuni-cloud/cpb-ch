name: 'Tauri Build'

on:
  push:
    branches:
      - main
      - master
      - tauri
  workflow_dispatch:

jobs:
  build-linux:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: 'x86_64'
            target: 'x86_64-unknown-linux-gnu'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      - name: build tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: tauri-v__VERSION__
          releaseName: 'CloudHealth Pricebook Studio Tauri v__VERSION__'
          releaseBody: |
            # 🚀 CloudHealth Pricebook Studio v5.0.0
            
            Official transition to **Tauri** architecture. Faster, lighter, and more secure.
            
            ## ✨ Key Features
            - **Tauri Migration**: 90% reduction in app size.
            - **History & Rollback**: Restore previous versions of your pricebooks.
            - **Export Suite**: Pro PDF and CSV exports.
            - **Template Library**: Reusable billing rule templates.
            - **Native ARM64**: Full support for Apple Silicon and Linux ARM.
            
            ## 📦 Installation
            Find the binary matching your OS and architecture below. macOS users may need to run `xattr -rd com.apple.quarantine` after install.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: rename x86_64 to amd64 in bundle filenames
        if: matrix.arch == 'x86_64'
        run: |
          find src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/ -name "*x86_64*" | while read f; do
            dir=$(dirname "$f")
            base=$(basename "$f")
            new_base="${base//x86_64/amd64}"
            mv "$f" "$dir/$new_base"
          done

      - name: upload renamed assets
        if: matrix.arch == 'x86_64'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="tauri-v$(node -p "require('./package.json').version")"
          find src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/ \
            \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) \
            -exec gh release upload "$TAG" {} --clobber \;
  build-windows:
    needs: build-linux
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: install frontend dependencies
        run: npm install

      - name: build portable exe
        run: npm run tauri build -- --no-bundle

      - name: upload portable exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mv "src-tauri/target/release/app.exe" "src-tauri/target/release/CloudHealth_Pricebook_Studio_Portable_v5.0.0.exe"
          gh release upload tauri-v5.0.0 "src-tauri/target/release/CloudHealth_Pricebook_Studio_Portable_v5.0.0.exe" --clobber

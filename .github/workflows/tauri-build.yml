name: 'Tauri Build'

on:
  workflow_dispatch: # Manual trigger only

jobs:
  build-linux:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: 'x86_64'
            target: 'x86_64-unknown-linux-gnu'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      - name: build tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }}
          includeRelease: true
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          tagName: tauri-v__VERSION__

      - name: standardize artifacts and fix release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="tauri-v$VERSION"
          TARGET_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          
          # 1. Rename all local files to our standard
          find "$TARGET_DIR" -type f | while read f; do
            dir=$(dirname "$f")
            filename=$(basename "$f")
            if [[ "$filename" != *"CloudHealth"* && "$filename" != *"cpb"* ]]; then continue; fi
            new_name="$filename"
            new_name="${new_name//CloudHealth Pricebook Studio/CloudHealth.Pricebook.Studio}"
            new_name="${new_name/x86_64/amd64}"
            new_name="${new_name/x64/amd64}"
            if [ "$filename" != "$new_name" ]; then
              mv "$f" "$dir/$new_name"
            fi
          done
          
          # 2. Fix the updater.json on GitHub
          mkdir -p temp_updater
          cd temp_updater
          # Download the updater.json generated by tauri-action
          gh release download "$TAG" -p "updater.json" || true
          if [ -f "updater.json" ]; then
            # Replace x86_64 with amd64 in the URLs
            sed -i 's/x86_64/amd64/g' updater.json
            sed -i 's/CloudHealth%20Pricebook%20Studio/CloudHealth.Pricebook.Studio/g' updater.json
            # Re-upload the fixed updater.json
            gh release upload "$TAG" updater.json --clobber
          fi
          cd ..
          
          # 3. Upload our perfectly named files
          find "$TARGET_DIR" -type f -name "CloudHealth.Pricebook.Studio_*" \
            -exec gh release upload "$TAG" {} --clobber \;
            
          # 4. Delete the bad default files from the release
          gh release delete-asset "$TAG" "CloudHealth.Pricebook.Studio-5.0.0-1.x86_64.rpm" -y || true
          # Note: gh release doesn't support wildcards for delete-asset easily, but we know the exact problematic ones
          # We can list assets and delete ones with x86_64
          gh release view "$TAG" --json assets -q '.assets[].name' | grep -i 'x86_64' | while read bad_asset; do
            gh release delete-asset "$TAG" "$bad_asset" -y || true
          done

  build-windows:
    needs: build-linux
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        run: npm install

      - name: build portable exe
        run: npm run tauri build -- --no-bundle

      - name: upload standardized assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $VERSION = node -p "require('./package.json').version"
          $TAG = "tauri-v$VERSION"
          $TARGET_DIR = "src-tauri/target/x86_64-pc-windows-msvc/release"
          $EXE = Get-ChildItem -Path $TARGET_DIR -Filter "*.exe" -Recurse | Where-Object { $_.Name -notlike "tauri*" -and $_.Name -notlike "cargo*" } | Select-Object -First 1
          if ($EXE) {
            $NEW_NAME = "CloudHealth.Pricebook.Studio_${VERSION}_amd64.exe"
            gh release create $TAG --title "CloudHealth Pricebook Studio v$VERSION" --notes "Production release v$VERSION" 2>$null
            gh release upload $TAG "$($EXE.FullName)#$NEW_NAME" --clobber
          }

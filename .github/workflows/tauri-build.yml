name: 'Tauri Build'

on:
  workflow_dispatch: # Manual trigger only

jobs:
  build-linux:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: 'x86_64'
            target: 'x86_64-unknown-linux-gnu'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      - name: build tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }}
          includeRelease: true
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          tagName: tauri-v5.0.0

      - name: standardize artifacts and fix release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="tauri-v5.0.0"
          TARGET_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          
          # 1. Rename all local files to our standard (dots instead of spaces, amd64 instead of x86_64)
          find "$TARGET_DIR" -type f | while read f; do
            dir=$(dirname "$f")
            filename=$(basename "$f")
            if [[ "$filename" != *"CloudHealth"* && "$filename" != *"cpb"* && "$filename" != *"app"* ]]; then continue; fi
            new_name="$filename"
            new_name="${new_name//CloudHealth Pricebook Studio/CloudHealth.Pricebook.Studio}"
            new_name="${new_name// /_}" # Replace any remaining spaces with underscores
            new_name="${new_name/x86_64/amd64}"
            new_name="${new_name/x64/amd64}"
            # Standardize RPM naming to underscores and strip revision
            if [[ "$new_name" == *".rpm"* ]]; then
              new_name="${new_name/-1./.}"
              new_name="${new_name//-/_}"
            fi
            if [ "$filename" != "$new_name" ]; then
              mv "$f" "$dir/$new_name"
            fi
          done
          
          # 2. TARGETED CLEANUP: ONLY delete the ghost x86_64 rpm
          echo "Cleaning up ghost x86_64 rpm from $TAG..."
          gh release view "$TAG" --json assets -q '.assets[].name' | grep -i 'x86_64' | grep '.rpm' | while read asset; do
            echo "Deleting $asset..."
            gh release delete-asset "$TAG" "$asset" -y || true
          done
          
          # 3. Fix the updater.json locally before upload
          mkdir -p temp_updater
          cd temp_updater
          gh release download "$TAG" -p "updater.json" || true
          if [ -f "updater.json" ]; then
            sed -i 's/x86_64/amd64/g' updater.json
            sed -i 's/CloudHealth%20Pricebook%20Studio/CloudHealth.Pricebook.Studio/g' updater.json
            sed -i 's/%20/_/g' updater.json
            gh release upload "$TAG" updater.json --clobber
          fi
          cd ..
          
          # 4. Upload our perfectly named files (filtered for binaries/signatures only)
          find "$TARGET_DIR" -type f -name "CloudHealth.Pricebook.Studio*" | grep -E '\.(deb|rpm|AppImage|sig|tar\.gz|dmg|exe)$' | while read file; do
            echo "Uploading $file..."
            gh release upload "$TAG" "$file" --clobber
          done

  build-windows:
    needs: build-linux
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        run: npm install

      - name: build portable exe
        run: npm run tauri build -- --no-bundle

      - name: upload standardized assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $VERSION = node -p "require('./package.json').version"
          $TAG = "tauri-v5.0.0"
          $TARGET_DIR = "src-tauri/target/release"
          $EXE = Get-ChildItem -Path $TARGET_DIR -Filter "*.exe" -Recurse | Where-Object { $_.Name -notlike "tauri*" -and $_.Name -notlike "cargo*" } | Select-Object -First 1
          if ($EXE) {
            $NEW_NAME = "CloudHealth.Pricebook.Studio_${VERSION}_amd64.exe"
            Rename-Item -Path $EXE.FullName -NewName $NEW_NAME
            $NEW_PATH = Join-Path -Path $EXE.DirectoryName -ChildPath $NEW_NAME
            gh release upload $TAG "$NEW_PATH" --clobber
            
            # Clean up rogue app.exe if it exists on the release
            try {
              gh release delete-asset $TAG "app.exe" -y 2>$null
            } catch {}
          }

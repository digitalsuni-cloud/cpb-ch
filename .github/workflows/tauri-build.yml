name: 'Tauri Build'

on:
  workflow_dispatch: # Manual trigger only

jobs:
  build-linux:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: 'x86_64'
            target: 'x86_64-unknown-linux-gnu'
          - arch: 'aarch64'
            target: 'aarch64-unknown-linux-gnu'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      - name: build tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }}
          # DISABLE automatic release/upload
          includeRelease: false
          includeUpdaterJson: true
          tagName: tauri-v__VERSION__

      - name: standardize linux bundle filenames
        run: |
          TARGET_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          VERSION=$(node -p "require('./package.json').version")
          
          find "$TARGET_DIR" -type f | while read f; do
            dir=$(dirname "$f")
            filename=$(basename "$f")
            
            # Skip if it doesn't look like our app file
            if [[ "$filename" != *"CloudHealth"* && "$filename" != *"cpb"* ]]; then continue; fi
            
            new_name="$filename"
            # Replace spaces with dots
            new_name="${new_name//CloudHealth Pricebook Studio/CloudHealth.Pricebook.Studio}"
            # Standardize architectures
            new_name="${new_name/x86_64/amd64}"
            new_name="${new_name/aarch64/arm64}"
            new_name="${new_name/x64/amd64}"
            
            if [ "$filename" != "$new_name" ]; then
              mv "$f" "$dir/$new_name"
            fi
          done

      - name: upload standardized assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="tauri-v$VERSION"
          TARGET_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          # Ensure release exists
          gh release create "$TAG" --title "CloudHealth Pricebook Studio v$VERSION" --notes "Production release v$VERSION" || true
          # Upload all standardized files including sigs and tar.gz
          find "$TARGET_DIR" -type f -name "CloudHealth.Pricebook.Studio_*" \
            -exec gh release upload "$TAG" {} --clobber \;

  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        run: npm install

      - name: build portable exe
        run: npm run tauri build -- --no-bundle

      - name: upload standardized assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $VERSION = node -p "require('./package.json').version"
          $TAG = "tauri-v$VERSION"
          $TARGET_DIR = "src-tauri/target/x86_64-pc-windows-msvc/release"
          $EXE = Get-ChildItem -Path $TARGET_DIR -Filter "*.exe" -Recurse | Where-Object { $_.Name -notlike "tauri*" -and $_.Name -notlike "cargo*" } | Select-Object -First 1
          if ($EXE) {
            $NEW_NAME = "CloudHealth.Pricebook.Studio_${VERSION}_amd64.exe"
            gh release create $TAG --title "CloudHealth Pricebook Studio v$VERSION" --notes "Production release v$VERSION" 2>$null
            gh release upload $TAG "$($EXE.FullName)#$NEW_NAME" --clobber
          }

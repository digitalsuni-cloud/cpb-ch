name: 'Tauri Build'

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release Tag (for manual uploads)'
        required: false
        default: 'v5.5.0'
  release:
    types: [created]

jobs:
  build-linux:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      - name: build tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-unknown-linux-gnu
          includeRelease: true
          releaseDraft: false
          prerelease: false

      - name: standardize artifacts and fix release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TARGET_DIR="src-tauri/target/x86_64-unknown-linux-gnu/release/bundle"
          
          # Rename all local files to our standard (dots instead of spaces, amd64 instead of x86_64)
          find "$TARGET_DIR" -type f | while read f; do
            dir=$(dirname "$f")
            filename=$(basename "$f")
            if [[ "$filename" != *"CloudHealth"* && "$filename" != *"ch"* && "$filename" != *"app"* && "$filename" != *"cpb"* ]]; then continue; fi
            new_name="$filename"
            new_name="${new_name//CloudHealth Pricebook Studio/CloudHealth.Pricebook.Studio}"
            new_name="${new_name// /_}" # Replace any remaining spaces with underscores
            new_name="${new_name/x86_64/amd64}"
            new_name="${new_name/x64/amd64}"
            
            if [[ "$new_name" == *".rpm"* ]]; then
              new_name="${new_name/-1._/_}"
              new_name="${new_name//-/_}"
            fi
            
            if [ "$filename" != "$new_name" ]; then
              mv "$f" "$dir/$new_name"
            fi
          done
          
          # Upload files to the release if it exists or manually triggered
          if [[ "${{ github.event_name }}" == "release" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            if [ -z "$TAG" ]; then TAG="${{ github.event.inputs.tag }}"; fi
            
            find "$TARGET_DIR" -type f -name "CloudHealth.Pricebook.Studio*" | grep -E '\.(deb|rpm|AppImage|sig|tar\.gz)$' | while read file; do
              echo "Uploading $file to $TAG..."
              gh release upload "$TAG" "$file" --clobber
            done
          fi

  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        run: npm install

      - name: build portable exe
        run: npm run tauri build -- --no-bundle

      - name: upload standardized assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $VERSION = node -p "require('./package.json').version"
          $TARGET_DIR = "src-tauri\target\release"
          
          Write-Host "Searching for exe in $TARGET_DIR..."
          $EXE = Get-ChildItem -Path $TARGET_DIR -Filter "*.exe" -Recurse | Where-Object { $_.Name -notlike "tauri*" -and $_.Name -notlike "cargo*" } | Select-Object -First 1
          
          if ($EXE) {
            Write-Host "Found executable: $($EXE.FullName)"
            $NEW_NAME = "CloudHealth.Pricebook.Studio_${VERSION}_amd64.exe"
            $NEW_PATH = Join-Path -Path $EXE.DirectoryName -ChildPath $NEW_NAME
            
            Write-Host "Renaming to $NEW_PATH..."
            Move-Item -Path $EXE.FullName -Destination $NEW_PATH -Force
            
            if ("${{ github.event_name }}" -eq "release" -or "${{ github.event_name }}" -eq "workflow_dispatch") {
              $TAG = "${{ github.event.release.tag_name }}"
              if (-not $TAG) { $TAG = "${{ github.event.inputs.tag }}" }
              
              Write-Host "Uploading $NEW_PATH to release $TAG..."
              gh release upload $TAG "$NEW_PATH" --clobber
            }
          } else {
            Write-Error "Could not find the .exe file in $TARGET_DIR"
          }

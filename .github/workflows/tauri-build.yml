name: 'Tauri Build'

on:
  push:
    branches:
      - main
      - master
      - tauri
  workflow_dispatch:

jobs:
  build-linux:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: 'x86_64'
            target: 'x86_64-unknown-linux-gnu'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      - name: build tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: tauri-v__VERSION__
          releaseName: 'CloudHealth Pricebook Studio Tauri v__VERSION__'
          releaseBody: |
            # 🚀 CloudHealth Pricebook Studio v5.0.0
            
            Official transition to **Tauri** architecture. Faster, lighter, and more secure.
            
            ## ✨ Key Features
            - **Tauri Migration**: 90% reduction in app size.
            - **History & Rollback**: Restore previous versions of your pricebooks.
            - **Export Suite**: Pro PDF and CSV exports.
            - **Template Library**: Reusable billing rule templates.
            - **Native ARM64**: Full support for Apple Silicon and Linux ARM.
                    ---
            ## 📦 File Details
            | Architecture | Platform | File to Download |
            | :--- | :--- | :--- |
            | ![macOS](https://raw.githubusercontent.com/digitalsuni-cloud/cpb-ch/main/public/badges/macos.svg) | Apple Silicon | [CloudHealth.Pricebook.Studio_5.0.0_arm64.dmg](https://github.com/digitalsuni-cloud/cpb-ch/releases/download/tauri-v__VERSION__/CloudHealth.Pricebook.Studio_5.0.0_arm64.dmg) |
            | ![macOS](https://raw.githubusercontent.com/digitalsuni-cloud/cpb-ch/main/public/badges/macos.svg) | Intel | [CloudHealth.Pricebook.Studio_5.0.0_amd64.dmg](https://github.com/digitalsuni-cloud/cpb-ch/releases/download/tauri-v__VERSION__/CloudHealth.Pricebook.Studio_5.0.0_amd64.dmg) |
            | ![Windows](https://raw.githubusercontent.com/digitalsuni-cloud/cpb-ch/main/public/badges/windows.svg) | x64 Portable | [CloudHealth.Pricebook.Studio_5.0.0_amd64.exe](https://github.com/digitalsuni-cloud/cpb-ch/releases/download/tauri-v__VERSION__/CloudHealth.Pricebook.Studio_5.0.0_amd64.exe) |
            | ![Linux Deb](https://raw.githubusercontent.com/digitalsuni-cloud/cpb-ch/main/public/badges/linux-deb.svg) | x64 (Deb) | [CloudHealth.Pricebook.Studio_5.0.0_amd64.deb](https://github.com/digitalsuni-cloud/cpb-ch/releases/download/tauri-v__VERSION__/CloudHealth.Pricebook.Studio_5.0.0_amd64.deb) |
            | ![Linux App](https://raw.githubusercontent.com/digitalsuni-cloud/cpb-ch/main/public/badges/linux-app.svg) | x64 (AppImage) | [CloudHealth.Pricebook.Studio_5.0.0_amd64.AppImage](https://github.com/digitalsuni-cloud/cpb-ch/releases/download/tauri-v__VERSION__/CloudHealth.Pricebook.Studio_5.0.0_amd64.AppImage) |
            | ![Linux RPM](https://raw.githubusercontent.com/digitalsuni-cloud/cpb-ch/main/public/badges/linux-rpm.svg) | x64 (RPM) | [CloudHealth.Pricebook.Studio_5.0.0_amd64.rpm](https://github.com/digitalsuni-cloud/cpb-ch/releases/download/tauri-v__VERSION__/CloudHealth.Pricebook.Studio_5.0.0_amd64.rpm) |
            | ![Linux Deb](https://raw.githubusercontent.com/digitalsuni-cloud/cpb-ch/main/public/badges/linux-deb.svg) | ARM64 (Deb) | [CloudHealth.Pricebook.Studio_5.0.0_arm64.deb](https://github.com/digitalsuni-cloud/cpb-ch/releases/download/tauri-v__VERSION__/CloudHealth.Pricebook.Studio_5.0.0_arm64.deb) |
            | ![Linux App](https://raw.githubusercontent.com/digitalsuni-cloud/cpb-ch/main/public/badges/linux-app.svg) | ARM64 (AppImage) | [CloudHealth.Pricebook.Studio_5.0.0_arm64.AppImage](https://github.com/digitalsuni-cloud/cpb-ch/releases/download/tauri-v__VERSION__/CloudHealth.Pricebook.Studio_5.0.0_arm64.AppImage) |
            | ![Linux RPM](https://raw.githubusercontent.com/digitalsuni-cloud/cpb-ch/main/public/badges/linux-rpm.svg) | ARM64 (RPM) | [CloudHealth.Pricebook.Studio_5.0.0_arm64.rpm](https://github.com/digitalsuni-cloud/cpb-ch/releases/download/tauri-v__VERSION__/CloudHealth.Pricebook.Studio_5.0.0_arm64.rpm) |
            
            > **Note for macOS Users:**
            > Because this is an internal application, it is not code-signed via the Apple Developer program. To run it for the first time, you must remove the quarantine attribute. Open your Terminal and run:
            > ```bash
            > xattr -rd com.apple.quarantine "/Applications/CloudHealth.Pricebook.Studio.app"
            > ```
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: standardize linux bundle filenames
        if: matrix.arch == 'x86_64' || matrix.arch == 'aarch64'
        run: |
          TARGET_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          VERSION=$(node -p "require('./package.json').version")
          find "$TARGET_DIR" -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) | while read f; do
            dir=$(dirname "$f")
            EXT="${f##*.}"
            # ARCH: amd64 or arm64
            ARCH="amd64"
            if [[ "$f" == *"aarch64"* ]] || [[ "$f" == *"arm64"* ]]; then ARCH="arm64"; fi
            # Standard: CloudHealth.Pricebook.Studio_VERSION_ARCH.EXT
            new_base="CloudHealth.Pricebook.Studio_${VERSION}_${ARCH}.${EXT}"
            if [ "$f" != "$dir/$new_base" ]; then
              mv "$f" "$dir/$new_base"
            fi
          done

      - name: upload standardized assets
        if: matrix.arch == 'x86_64' || matrix.arch == 'aarch64'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="tauri-v$VERSION"
          TARGET_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          find "$TARGET_DIR" \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) \
            -exec gh release upload "$TAG" {} --clobber \;

  build-windows:
    needs: build-linux
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: install frontend dependencies
        run: npm install

      - name: build portable exe
        run: npm run tauri build -- --no-bundle

      - name: upload portable exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = node -p "require('./package.json').version"
          mv "src-tauri/target/release/CloudHealth.Pricebook.Studio.exe" "src-tauri/target/release/CloudHealth.Pricebook.Studio_${version}_amd64.exe"
          gh release upload tauri-v$version "src-tauri/target/release/CloudHealth.Pricebook.Studio_${version}_amd64.exe" --clobber

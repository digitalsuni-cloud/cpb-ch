name: 'Tauri Build'

on:
  push:
    branches:
      - main
      - master
      - tauri
  workflow_dispatch:

jobs:
  build-linux:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: 'x86_64'
            target: 'x86_64-unknown-linux-gnu'
          - arch: 'arm64'
            target: 'aarch64-unknown-linux-gnu'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install dependencies
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            sudo dpkg --add-architecture arm64
            # Remove ALL apt source overrides the runner sets up
            sudo rm -f /etc/apt/apt-mirrors.txt
            sudo rm -rf /etc/apt/sources.list.d/*
            # Write a clean, architecture-specific sources.list
            printf '%s\n' \
              'deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse' \
              'deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu/ jammy-updates main restricted universe multiverse' \
              'deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu/ jammy-backports main restricted universe multiverse' \
              'deb [arch=amd64] http://security.ubuntu.com/ubuntu/ jammy-security main restricted universe multiverse' \
              'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse' \
              'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse' \
              'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse' \
              | sudo tee /etc/apt/sources.list
            # Allow update to continue even if some repos are unreachable
            sudo apt-get update || true
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu qemu-user-static
            sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
            sudo apt-get install -y libwebkit2gtk-4.1-dev:arm64 libappindicator3-dev:arm64 librsvg2-dev:arm64 libssl-dev:arm64 libsoup-3.0-dev:arm64
          else
            sudo apt-get update
            sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          fi

      - name: install frontend dependencies
        run: npm install

      - name: build tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKG_CONFIG_ALLOW_CROSS: 1
          PKG_CONFIG_LIBDIR_aarch64_unknown_linux_gnu: /usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.arch == 'arm64' && 'aarch64-linux-gnu-gcc' || '' }}
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          tagName: tauri-v__VERSION__
          releaseName: 'CloudHealth Pricebook Studio Tauri v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} ${{ matrix.arch == 'arm64' && '--bundles deb' || '' }}

      - name: rename aarch64 to arm64
        if: matrix.arch == 'arm64'
        run: |
          find src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/ -name "*aarch64*" -exec bash -c 'mv "$1" "${1//aarch64/arm64}"' -- {} \;

  build-windows:
    needs: build-linux
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: install frontend dependencies
        run: npm install

      - name: build portable exe
        run: npm run tauri build -- --no-bundle

      - name: upload portable exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mv "src-tauri/target/release/app.exe" "src-tauri/target/release/CloudHealth_Pricebook_Studio_Portable_v5.0.0.exe"
          gh release upload tauri-v5.0.0 "src-tauri/target/release/CloudHealth_Pricebook_Studio_Portable_v5.0.0.exe" --clobber
